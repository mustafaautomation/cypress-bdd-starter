name: Smoke Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    name: Smoke Suite
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        uses: cypress-io/github-action@v6
        with:
          runTests: false

      - name: Lint check
        run: npm run lint

      - name: Format check
        run: npm run format:check

      - name: Run smoke tests
        uses: cypress-io/github-action@v6
        with:
          install: false
          command: npm run test:smoke
        env:
          CYPRESS_BASE_URL: ${{ vars.CYPRESS_BASE_URL || 'https://www.saucedemo.com' }}
          CYPRESS_STANDARD_USER: ${{ vars.CYPRESS_STANDARD_USER || 'standard_user' }}
          CYPRESS_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-screenshots-${{ github.run_id }}
          path: reports/screenshots/
          retention-days: 7
