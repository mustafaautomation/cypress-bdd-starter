name: Regression Tests

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  regression:
    name: Regression Suite
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run regression tests
        uses: cypress-io/github-action@v6
        with:
          command: npm run test:regression
        env:
          CYPRESS_BASE_URL: ${{ vars.CYPRESS_BASE_URL || 'https://www.saucedemo.com' }}
          CYPRESS_STANDARD_USER: ${{ vars.CYPRESS_STANDARD_USER || 'standard_user' }}
          CYPRESS_PASSWORD: ${{ secrets.CYPRESS_PASSWORD }}

      - name: Upload screenshots on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: regression-screenshots-${{ github.run_id }}
          path: reports/screenshots/
          retention-days: 30

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results-${{ github.run_id }}
          path: reports/junit/
          retention-days: 30
